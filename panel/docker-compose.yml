services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: traceback
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d traceback"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: ./api
      target: dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/traceback
      REDIS_URL: redis://redis:6379
    networks:
      - internal
      - proxy
    volumes:
      - ./api/src:/app/src:ro
      - ./api/migrations:/app/migrations
    command: sh -c "npm run db:migrate && npm run dev"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traceback-api.rule=Host(`traceback-api.wildowl.tech`)"
      - "traefik.http.routers.traceback-api.entrypoints=websecure"
      - "traefik.http.routers.traceback-api.tls.certresolver=cfresolver"
      - "traefik.http.routers.traceback-api.tls.domains[0].main=wildowl.tech"
      - "traefik.http.routers.traceback-api.tls.domains[0].sans=*.wildowl.tech"
      - "traefik.http.services.traceback-api.loadbalancer.server.port=4000"

  web:
    build:
      context: ./web
      target: prod
      args:
        NEXT_PUBLIC_API_URL: https://traceback-api.wildowl.tech
        NEXT_PUBLIC_WS_URL: wss://traceback-api.wildowl.tech/graphql-ws
    restart: unless-stopped
    depends_on:
      - api
    env_file: .env
    environment:
      PORT: "3001"
      NODE_ENV: production
    networks:
      - internal
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traceback.rule=Host(`traceback.wildowl.tech`)"
      - "traefik.http.routers.traceback.entrypoints=websecure"
      - "traefik.http.routers.traceback.tls.certresolver=cfresolver"
      - "traefik.http.routers.traceback.tls.domains[0].main=wildowl.tech"
      - "traefik.http.routers.traceback.tls.domains[0].sans=*.wildowl.tech"
      - "traefik.http.services.traceback.loadbalancer.server.port=3001"

volumes:
  postgres_data:

networks:
  internal:
  proxy:
    external: true
